<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
     <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
     <link rel="stylesheet" href="/ASSET/CSS/login.css">
    <title>Document</title>
</head>
<body class="flex bg-[#121212] justify-center items-center min-h-screen">
    <section class="flex flex-col  p-2 items-center">
        <div class="bg-blue-200 w-70 h-15 mb-3 "></div>
        <div class="bg-[#0C0A09] w-140 h-120 p-7 text-white flex flex-col items-center border border-white/15 rounded-xl">
            <header class="text-3xl font-medium">Login</header>
            <nav class="text-gray-300 font-normal">Enter your email and password below to log in</nav>
        <div class="flex flex-col items-start w-full h-15 mt-4">
        <label>Email Address</label>
        <input type="text" placeholder="email@example.com" class="mt-2 rounded-sm w-full h-12 bg-gray-700 p-2">
        </div>
        <div class="flex flex-col items-start w-full h-15 mt-8">
        <nav class="flex justify-between w-full">
            <label>Password</label>
            <label>Forgot your password?</label>
        </nav>
        <input type="password" placeholder="password" class="mt-2 rounded-sm w-full h-12 bg-gray-700 p-2">
        </div>
        <label class="flex items-center w-full gap-2 mt-10 ">
            <input type="checkbox"> Remember me</label>
        <div class="w-full flex h-10 bg-[#0178BD] items-center mt-4 justify-center font-medium text-sm rounded-sm">Log in</div>
        <footer class="mt-4">Don't have an account? <a href="signup.html">Sign up</a></footer>
    </div>
    </section>
</body>
</html>
